name: Content Pages Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (optional). If empty, content/version.txt is used."
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "content-studio/**"
      - "scripts/validate_content.sh"
      - "scripts/build_package.sh"
      - "scripts/build_manifest.sh"
      - ".github/workflows/content-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "content-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONTENT_BASE_URL: ${{ vars.CONTENT_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(tr -d '[:space:]' < content/version.txt)"
          fi

          if [ -z "$VERSION" ]; then
            echo "VERSION is empty"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build package
        run: |
          chmod +x ./scripts/validate_content.sh ./scripts/build_package.sh ./scripts/build_manifest.sh
          ./scripts/build_package.sh ./content "$VERSION" "./dist/core_${VERSION}.zip"

      - name: Build manifest
        run: |
          BASE_URL="$CONTENT_BASE_URL"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          fi

          PACKAGE_URL="$BASE_URL/content/core_${VERSION}.zip"
          ./scripts/build_manifest.sh "./dist/core_${VERSION}.zip" "$PACKAGE_URL" "$VERSION" "1.0.0" "./dist/manifest.json"

      - name: Prepare pages artifact
        run: |
          mkdir -p public/content public/studio
          cp "./dist/core_${VERSION}.zip" public/content/
          cp "./dist/manifest.json" public/content/
          cp -R ./content-studio/. public/studio/
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ZooMini Content</title>
            <style>
              body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; margin: 2rem; line-height: 1.5; }
              h1 { margin-bottom: .2rem; }
              a { color: #0a84ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { padding-left: 1.2rem; }
            </style>
          </head>
          <body>
            <h1>ZooMini Content</h1>
            <p>Published artifacts:</p>
            <ul>
              <li><a href="./studio/">Content Studio</a></li>
              <li><a href="./content/manifest.json">manifest.json</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
