name: Content Validate

on:
  pull_request:
    paths:
      - "content/**"
      - "scripts/validate_content.sh"
      - ".github/workflows/content-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Validate content
        run: |
          chmod +x ./scripts/validate_content.sh
          ./scripts/validate_content.sh ./content
